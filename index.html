<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seminar Mark System - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --primary-light:#60a5fa;
  --gold:#d4af37;
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --success:#16a34a;
  --error:#dc2626;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#e0f2fe,#fef9c3);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* Floating shapes */
.shape{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.4;
  animation:float 8s infinite ease-in-out alternate;
}
.shape1{width:300px;height:300px;background:#60a5fa;top:-50px;left:-50px}
.shape2{width:400px;height:400px;background:#facc15;bottom:-100px;right:-100px;animation-delay:2s}

@keyframes float{
  from{transform:translateY(0)}
  to{transform:translateY(40px)}
}

/* Card */
.card{
  width:380px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:40px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  text-align:center;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}

h2{
  margin-bottom:10px;
  color:var(--text);
}

.subtitle{
  font-size:13px;
  color:var(--muted);
  margin-bottom:30px;
}

.input-group{
  margin-bottom:18px;
  text-align:left;
}

.input-group label{
  font-size:12px;
  font-weight:500;
  color:var(--muted);
}

.input-group input{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #e2e8f0;
  outline:none;
  transition:0.3s;
}

.input-group input:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

/* Show password */
.show-pass{
  display:flex;
  align-items:center;
  font-size:12px;
  margin-top:5px;
  color:var(--muted);
  cursor:pointer;
}

button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
  margin-top:10px;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(37,99,235,0.3);
}

#msg{
  margin-top:15px;
  font-size:13px;
  min-height:18px;
}

.footer{
  margin-top:20px;
  font-size:11px;
  color:var(--muted);
}

/* Success Screen */
.success-screen{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#fff;
  font-size:22px;
  font-weight:600;
  transform:scale(0);
  transition:0.5s ease;
}

.success-screen.active{
  transform:scale(1);
}

.success-icon{
  font-size:60px;
  margin-bottom:15px;
  animation:pop 0.6s ease;
}

@keyframes pop{
  from{transform:scale(0)}
  to{transform:scale(1)}
}
</style>
</head>

<body>

<div class="shape shape1"></div>
<div class="shape shape2"></div>

<div class="card">
  <h2>Faculty Portal</h2>
  <div class="subtitle">Sign in to continue</div>

  <div class="input-group">
    <label>Faculty ID</label>
    <input id="faculty_id" type="text">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input id="password" type="password">
    <div class="show-pass" onclick="togglePassword()">
      <input type="checkbox" id="showChk"> &nbsp; Show Password
    </div>
  </div>

  <button onclick="login()">Sign In</button>
  <div id="msg"></div>

  <div class="footer">Secure · Encrypted · Session Based</div>
</div>

<!-- Success Page -->
<div class="success-screen" id="successPage">
  <div class="success-icon">✔</div>
  Login Successful
  <div style="font-size:14px;margin-top:8px">Redirecting to Dashboard...</div>
</div>

<script>
function togglePassword(){
  const pass=document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

async function login(){
  const id=document.getElementById("faculty_id").value.trim();
  const pass=document.getElementById("password").value.trim();
  const msg=document.getElementById("msg");

  if(!id||!pass){
    msg.style.color="red";
    msg.textContent="Please enter Faculty ID and Password";
    return;
  }

  msg.style.color="blue";
  msg.textContent="Verifying...";

  // Simulated success (replace with your postData)
  setTimeout(()=>{
    document.getElementById("successPage").classList.add("active");

    setTimeout(()=>{
      window.location="faculty.html";
    },2000);

  },1000);
}
</script>

</body>
</html>
