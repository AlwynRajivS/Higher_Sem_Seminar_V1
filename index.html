<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCET - Seminar Mark Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="common.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#e6f2ff,#ffffff);
}

/* ================= FRONT LOADER ================= */

.loader-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#003366,#007bff);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:1000;
    transition:1s ease;
}

.loader-title{
    font-size:48px;
    font-weight:800;
    letter-spacing:3px;
    border-right:4px solid white;
    white-space:nowrap;
    overflow:hidden;
    animation:typing 2s steps(6), blink .7s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:100%}
}

@keyframes blink{
    50%{border-color:transparent}
}

.loader-sub{
    margin-top:15px;
    font-size:18px;
}

.progress-bar-container{
    margin-top:30px;
    width:250px;
    height:6px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

.progress-bar-fill{
    height:100%;
    width:0;
    background:#ffdd00;
    animation:load 3s forwards;
}

@keyframes load{
    to{width:100%}
}

/* Hide Loader */
.loader-screen.hide{
    opacity:0;
    visibility:hidden;
}

/* ================= PARTICLES ================= */

canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* ================= LOGIN ================= */

.container-wrapper{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-box{
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.7);
    border-radius:25px;
    padding:45px;
    width:400px;
    box-shadow:0 30px 60px rgba(0,0,0,0.2);
    text-align:center;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

.kcet-title{
    font-size:34px;
    font-weight:800;
    color:#003366;
}

.system-title{
    font-size:17px;
    font-weight:600;
    color:#007bff;
    margin-bottom:25px;
}

.btn-login{
    background:linear-gradient(90deg,#007bff,#0047ab);
    color:white;
    height:45px;
    border:none;
    border-radius:12px;
    font-weight:600;
    transition:0.3s;
    box-shadow:0 6px #002f6c;
}

.btn-login:hover{
    transform:translateY(3px);
    box-shadow:0 3px #002f6c;
}

.success-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#003366,#007bff);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    font-size:26px;
    font-weight:600;
    z-index:999;
    opacity:0;
    visibility:hidden;
    transition:.5s;
}

.success-screen.active{
    opacity:1;
    visibility:visible;
}
</style>
</head>

<body>

<!-- FRONT LOADER -->
<div class="loader-screen" id="loader">
    <div class="loader-title">KCET</div>
    <div class="loader-sub">Seminar Mark Management System</div>
    <div class="progress-bar-container">
        <div class="progress-bar-fill"></div>
    </div>
</div>

<canvas id="particles"></canvas>

<div class="container-wrapper">
<div class="login-box">
    <div class="kcet-title">KCET</div>
    <div class="system-title">Seminar Mark Management System</div>

    <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input id="faculty_id" class="form-control" placeholder="Faculty ID">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input id="password" type="password" class="form-control" placeholder="Password">
        <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
            <i id="eyeIcon" class="bi bi-eye"></i>
        </span>
    </div>

    <button class="btn-login w-100" onclick="login()">Login</button>
    <div id="msg" class="mt-3 fw-semibold"></div>
</div>
</div>

<div class="success-screen" id="successScreen">
    Welcome to KCET Portal 👋<br>
    Loading Dashboard...
</div>

<script>

/* Hide loader after 3 sec */
window.onload=function(){
    setTimeout(()=>{
        document.getElementById("loader").classList.add("hide");
    },3000);
};

/* Password toggle */
function togglePassword(){
    const pass=document.getElementById("password");
    const eye=document.getElementById("eyeIcon");
    pass.type = pass.type==="password" ? "text":"password";
    eye.classList.toggle("bi-eye");
    eye.classList.toggle("bi-eye-slash");
}

/* Login */
async function login(){
    const id=document.getElementById("faculty_id").value.trim();
    const password=document.getElementById("password").value.trim();
    const msg=document.getElementById("msg");

    if(!id || !password){
        msg.style.color="red";
        msg.innerText="Enter Faculty ID & Password";
        return;
    }

    const res=await postData("login",{id,password});

    if(res.status==="success"){
        localStorage.setItem("faculty_id",res.faculty_id);
        localStorage.setItem("venue",res.venue);
        localStorage.setItem("role",res.role);
        localStorage.setItem("faculty_name",res.faculty_name);
        localStorage.setItem("batch",res.batch);

        document.getElementById("successScreen").classList.add("active");

        setTimeout(()=>{
            if(res.role==="Admin") window.location="admin.html";
            else if(res.role==="VenueIncharge") window.location="venue_incharge.html";
            else window.location="faculty.html";
        },2000);

    }else{
        msg.style.color="red";
        msg.innerText="Invalid Credentials ❌";
    }
}

/* Particle Animation */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2+1,
        dx:(Math.random()-0.5),
        dy:(Math.random()-0.5)
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#007bff";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
        p.x+=p.dx;
        p.y+=p.dy;
        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });
    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
