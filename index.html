<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCET - Seminar Mark Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="common.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    background:linear-gradient(135deg,#ffffff,#e6f2ff,#cce6ff);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* Blue Glow Background */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#007bff55,transparent);
    border-radius:50%;
    animation:float 6s infinite alternate ease-in-out;
}

@keyframes float{
    from{transform:translate(-120px,-120px);}
    to{transform:translate(120px,120px);}
}

.login-box{
    background:#ffffff;
    padding:40px;
    width:380px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    text-align:center;
    animation:fadeIn 1s ease;
    z-index:1;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

.kcet-title{
    font-size:32px;
    font-weight:800;
    color:#003366;
}

.system-title{
    font-size:18px;
    font-weight:600;
    color:#007bff;
    margin-bottom:25px;
}

.input-group{
    margin:15px 0;
}

.form-control{
    height:45px;
    border-radius:10px;
}

.btn-login{
    background:linear-gradient(90deg,#007bff,#0056b3);
    border:none;
    color:white;
    height:45px;
    font-weight:600;
    border-radius:10px;
    transition:0.3s;
}

.btn-login:hover{
    transform:scale(1.05);
}

/* Full Screen Success Animation */
.success-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#003366,#007bff,#66b3ff);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    font-size:28px;
    font-weight:600;
    z-index:999;
    opacity:0;
    visibility:hidden;
    transition:0.5s;
}

.success-screen.active{
    opacity:1;
    visibility:visible;
}

.loader{
    margin-top:20px;
    width:200px;
    height:6px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

.loader span{
    display:block;
    height:100%;
    width:0;
    background:#ffdd00;
    animation:load 2.5s forwards;
}

@keyframes load{
    to{width:100%;}
}

</style>
</head>

<body>

<div class="login-box">
    <div class="kcet-title">KCET</div>
    <div class="system-title">Seminar Mark Management System</div>

    <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input id="faculty_id" class="form-control" placeholder="Faculty ID">
    </div>

    <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input id="password" type="password" class="form-control" placeholder="Password">
        <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
            <i id="eyeIcon" class="bi bi-eye"></i>
        </span>
    </div>

    <button class="btn-login w-100 mt-3" onclick="login()">
        <i class="bi bi-box-arrow-in-right"></i> Login
    </button>

    <div id="msg" class="mt-3 fw-semibold"></div>
</div>

<!-- Animated Fullscreen -->
<div class="success-screen" id="successScreen">
    <div>Welcome to KCET 👋</div>
    <div style="font-size:20px;margin-top:10px;">
        Loading Dashboard...
    </div>
    <div class="loader"><span></span></div>
</div>

<script>
function togglePassword(){
    const pass=document.getElementById("password");
    const eye=document.getElementById("eyeIcon");

    if(pass.type==="password"){
        pass.type="text";
        eye.classList.remove("bi-eye");
        eye.classList.add("bi-eye-slash");
    }else{
        pass.type="password";
        eye.classList.remove("bi-eye-slash");
        eye.classList.add("bi-eye");
    }
}

async function login(){
    const id=document.getElementById("faculty_id").value.trim();
    const password=document.getElementById("password").value.trim();
    const msg=document.getElementById("msg");

    if(!id || !password){
        msg.style.color="red";
        msg.innerText="Please enter Faculty ID & Password";
        return;
    }

    msg.style.color="#007bff";
    msg.innerText="Verifying...";

    const res=await postData("login",{id,password});

    if(res.status==="success"){
        localStorage.setItem("faculty_name",res.faculty_name);
        localStorage.setItem("role",res.role);

        document.getElementById("successScreen").classList.add("active");

        setTimeout(()=>{
            if(res.role==="Admin") window.location="admin.html";
            else if(res.role==="VenueIncharge") window.location="venue_incharge.html";
            else window.location="faculty.html";
        },2500);

    }else{
        msg.style.color="red";
        msg.innerText="Invalid Credentials ❌";
    }
}
</script>

</body>
</html>
