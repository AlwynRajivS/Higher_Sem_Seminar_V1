<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KCET - Seminar Mark Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="common.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#e6f2ff,#ffffff);
}

/* ===== FRONT LOADER ===== */
.loader-screen{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#003366,#007bff);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
    z-index:1000;
    transition:1s;
}
.loader-title{
    font-size:50px;
    font-weight:800;
    letter-spacing:3px;
}
.loader-screen.hide{
    opacity:0;
    visibility:hidden;
}

/* ===== PARTICLES ===== */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* ===== LOGIN CARD ===== */
.container-wrapper{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-box{
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.7);
    border-radius:25px;
    padding:45px;
    width:400px;
    box-shadow:0 30px 60px rgba(0,0,0,0.2);
    text-align:center;
    opacity:0;
    animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

.kcet-title{
    font-size:34px;
    font-weight:800;
    color:#003366;
}

.system-title{
    color:#007bff;
    margin-bottom:25px;
    font-weight:600;
}

/* Input Glow */
.form-control:focus{
    box-shadow:0 0 10px #007bff;
    border-color:#007bff;
}

.valid{
    box-shadow:0 0 10px #28a745 !important;
}
.invalid{
    box-shadow:0 0 10px #dc3545 !important;
}

/* 3D Button */
.btn-login{
    background:linear-gradient(90deg,#007bff,#0047ab);
    color:white;
    height:45px;
    border:none;
    border-radius:12px;
    font-weight:600;
    transition:.3s;
    box-shadow:0 6px #002f6c;
}
.btn-login:hover{
    transform:translateY(3px);
    box-shadow:0 3px #002f6c;
}

/* Shake Animation */
@keyframes shake{
    0%{transform:translateX(0)}
    25%{transform:translateX(-8px)}
    50%{transform:translateX(8px)}
    75%{transform:translateX(-8px)}
    100%{transform:translateX(0)}
}
.shake{
    animation:shake .4s;
}

/* Success Screen */
.success-screen{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#003366,#007bff);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:26px;
    z-index:999;
    opacity:0;
    visibility:hidden;
    transition:.6s;
}
.success-screen.active{
    opacity:1;
    visibility:visible;
}

/* Green Checkmark */
.checkmark{
    font-size:70px;
    color:#00ff88;
    animation:pop .5s ease;
}
@keyframes pop{
    0%{transform:scale(0)}
    100%{transform:scale(1)}
}

/* Smooth Fade Transition */
.fade-out{
    animation:fadePage 1s forwards;
}
@keyframes fadePage{
    to{opacity:0}
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader-screen" id="loader">
    <div class="loader-title">KCET</div>
    <div>Loading Portal...</div>
</div>

<canvas id="particles"></canvas>

<div class="container-wrapper">
<div class="login-box" id="loginBox">
    <div class="kcet-title">KCET</div>
    <div class="system-title">Seminar Mark Management System</div>

    <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input id="faculty_id" class="form-control" placeholder="Faculty ID">
    </div>

    <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input id="password" type="password" class="form-control" placeholder="Password">
        <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
            <i id="eyeIcon" class="bi bi-eye"></i>
        </span>
    </div>

    <button class="btn-login w-100" onclick="login()" id="loginBtn">Login</button>
    <div id="msg" class="mt-3 fw-semibold"></div>
</div>
</div>

<div class="success-screen" id="successScreen">
    <div class="checkmark">✔</div>
    Login Successful!
</div>

<script>

/* Hide Loader */
window.onload=function(){
    setTimeout(()=>{
        document.getElementById("loader").classList.add("hide");
    },2000);
};

/* Password Toggle */
function togglePassword(){
    const pass=document.getElementById("password");
    const eye=document.getElementById("eyeIcon");
    pass.type = pass.type==="password" ? "text":"password";
    eye.classList.toggle("bi-eye");
    eye.classList.toggle("bi-eye-slash");
}

/* Real-time Validation Glow */
document.getElementById("faculty_id").addEventListener("input",function(){
    this.classList.toggle("valid",this.value.length>3);
});
document.getElementById("password").addEventListener("input",function(){
    this.classList.toggle("valid",this.value.length>3);
});

/* Login */
async function login(){
    const id=document.getElementById("faculty_id");
    const pass=document.getElementById("password");
    const msg=document.getElementById("msg");
    const btn=document.getElementById("loginBtn");

    if(!id.value || !pass.value){
        msg.style.color="red";
        msg.innerText="Enter Faculty ID & Password";
        return;
    }

    btn.disabled=true;
    btn.innerHTML='<span class="spinner-border spinner-border-sm"></span> Verifying...';

    const res=await postData("login",{id:id.value,password:pass.value});

    if(res.status==="success"){

        localStorage.setItem("faculty_id",res.faculty_id);
        localStorage.setItem("venue",res.venue);
        localStorage.setItem("role",res.role);
        localStorage.setItem("faculty_name",res.faculty_name);
        localStorage.setItem("batch",res.batch);

        document.getElementById("successScreen").classList.add("active");

        setTimeout(()=>{
            document.body.classList.add("fade-out");
        },1000);

        setTimeout(()=>{
            if(res.role==="Admin") window.location="admin.html";
            else if(res.role==="VenueIncharge") window.location="venue_incharge.html";
            else window.location="faculty.html";
        },2000);

    }else{

        document.getElementById("loginBox").classList.add("shake");
        setTimeout(()=>{ document.getElementById("loginBox").classList.remove("shake"); },400);

        msg.style.color="red";
        msg.innerText="Invalid Credentials ❌";

        btn.disabled=false;
        btn.innerHTML="Login";
    }
}

/* Particle Animation */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<70;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2+1,
        dx:(Math.random()-0.5),
        dy:(Math.random()-0.5)
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#007bff";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
        p.x+=p.dx;
        p.y+=p.dy;
        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });
    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
