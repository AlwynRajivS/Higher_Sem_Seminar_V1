<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KCET - Seminar Mark Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --gold:#d4af37;
  --success:#16a34a;
  --error:#dc2626;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:linear-gradient(-45deg,#0ea5e9,#9333ea,#facc15,#22c55e);
  background-size:400% 400%;
  animation:gradientBG 18s ease infinite;
}

@keyframes gradientBG{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Glass Card */
.card{
  width:500px;
  padding:50px;
  border-radius:30px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(25px);
  box-shadow:0 30px 60px rgba(0,0,0,0.3);
  text-align:center;
  color:#fff;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(50px)}
  to{opacity:1;transform:translateY(0)}
}

/* Titles */
.kcet{
  font-size:42px;
  font-weight:800;
  letter-spacing:2px;
  font-family:'Playfair Display',serif;
  margin-bottom:10px;
}

.main-title{
  font-size:26px;
  font-weight:600;
  margin-bottom:30px;
}

/* Inputs */
.input-group{
  margin-bottom:20px;
  text-align:left;
}

.input-group input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:14px;
}

.eye{
  position:absolute;
  right:20px;
  margin-top:-35px;
  cursor:pointer;
  color:#333;
}

/* Button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:600;
  background:linear-gradient(135deg,#2563eb,#9333ea);
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

#msg{
  margin-top:15px;
  min-height:20px;
}

/* Success Screen */
.success{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
  font-size:28px;
  transform:scale(0);
  transition:0.5s;
}

.success.active{
  transform:scale(1);
}

.logout-btn{
  margin-top:20px;
  padding:10px 20px;
  background:#fff;
  color:#000;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <div class="kcet">KCET</div>
  <div class="main-title">Seminar Mark Management System</div>

  <div class="input-group">
    <input id="faculty_id" type="text" placeholder="Faculty ID">
  </div>

  <div class="input-group">
    <input id="password" type="password" placeholder="Password">
    <span class="eye" onclick="togglePassword()">👁</span>
  </div>

  <button onclick="login()">Sign In</button>
  <div id="msg"></div>
</div>

<div class="success" id="successPage">
  ✔ Login Successful  
  <div style="font-size:16px;margin-top:10px">Welcome to KCET Portal</div>
</div>

<script>
function togglePassword(){
  const pass=document.getElementById("password");
  pass.type = pass.type==="password"?"text":"password";
}

function login(){
  const id=document.getElementById("faculty_id").value.trim();
  const pass=document.getElementById("password").value.trim();
  const msg=document.getElementById("msg");

  if(!id||!pass){
    msg.style.color="yellow";
    msg.textContent="Please enter Faculty ID and Password";
    return;
  }

  msg.textContent="Verifying...";
  
  setTimeout(()=>{
    document.getElementById("successPage").classList.add("active");

    setTimeout(()=>{
      window.location="faculty.html";
    },2000);

  },1000);
}
</script>

</body>
</html>
